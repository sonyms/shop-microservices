global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'shop-microservices'
    metrics_path: '/actuator/prometheus'
    # Use host.docker.internal to allow Prometheus inside Docker to scrape Spring Boot running on your local Windows host
    static_configs:
      - targets: 
        - 'host.docker.internal:8080' # API Gateway
        - 'host.docker.internal:8081' # User Service
        - 'host.docker.internal:8082' # Product Service
        - 'host.docker.internal:8083' # Cart Service
        - 'host.docker.internal:8084' # Auth Service
        - 'host.docker.internal:8085' # Order Service
