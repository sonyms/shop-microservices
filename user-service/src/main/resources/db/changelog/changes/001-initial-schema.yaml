databaseChangeLog:
  - changeSet:
      id: "1"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: user_profiles
      changes:
        - createTable:
            tableName: user_profiles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: address
                  type: VARCHAR(255)
              - column:
                  name: full_name
                  type: VARCHAR(255)
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: deleted
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
  - changeSet:
      id: "2"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                indexName: idx_user_profiles_username
                tableName: user_profiles
      changes:
        - createIndex:
            indexName: idx_user_profiles_username
            tableName: user_profiles
            columns:
              - column:
                  name: username
