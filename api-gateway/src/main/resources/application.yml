server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024

spring:
  mvc:
    throw-exception-if-no-handler-found: true

app:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost,http://localhost:3000"
  web:
    resources:
      add-mappings: false
  threads:
    virtual:
      enabled: true
  application:
    name: api-gateway
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10s
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters: []
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173,http://localhost:3000,http://localhost"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:19411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  tracing:
    enabled: true
    sampling:
      probability: 0.1

security:
  public-endpoints: /auth,/swagger-ui,/v3/api-docs
  public-get-endpoints: /products

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [traceId=%X{traceId:-}, spanId=%X{spanId:-}] - %msg%n"




---
spring:
  config:
    activate:
      on-profile: k8s
eureka:
  client:
    enabled: false
