databaseChangeLog:
  - changeSet:
      id: "1"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: brands
      changes:
        - createTable:
            tableName: brands
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: deleted
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
  - changeSet:
      id: "2"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: categories
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: deleted
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
  - changeSet:
      id: "3"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: products
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: price
                  type: NUMERIC(38, 2)
                  constraints:
                    nullable: false
              - column:
                  name: stock_quantity
                  type: INT
              - column:
                  name: image_url
                  type: VARCHAR(255)
              - column:
                  name: category_id
                  type: BIGINT
              - column:
                  name: brand_id
                  type: BIGINT
              - column:
                  name: deleted
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
  - changeSet:
      id: "4"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - foreignKeyConstraintExists:
                foreignKeyName: fk_products_category
      changes:
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: category_id
            constraintName: fk_products_category
            referencedTableName: categories
            referencedColumnNames: id
  - changeSet:
      id: "5"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - foreignKeyConstraintExists:
                foreignKeyName: fk_products_brand
      changes:
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: brand_id
            constraintName: fk_products_brand
            referencedTableName: brands
            referencedColumnNames: id
  - changeSet:
      id: "6"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                indexName: idx_product_name
                tableName: products
      changes:
        - createIndex:
            indexName: idx_product_name
            tableName: products
            columns:
              - column:
                  name: name
  - changeSet:
      id: "7"
      author: "antigravity"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                indexName: idx_product_category
                tableName: products
      changes:
        - createIndex:
            indexName: idx_product_category
            tableName: products
            columns:
              - column:
                  name: category_id
  - changeSet:
      id: "8"
      author: "antigravity"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: processed_events
      changes:
        - createTable:
            tableName: processed_events
            columns:
              - column:
                  name: event_id
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: processed_at
                  type: TIMESTAMP WITHOUT TIME ZONE
