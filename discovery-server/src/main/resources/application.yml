server:
  port: 8761

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: discovery-server

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

management:
  zipkin:
    tracing:
      endpoint: http://localhost:19411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: '*'




