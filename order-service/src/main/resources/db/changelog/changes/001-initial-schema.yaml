databaseChangeLog:
  - changeSet:
      id: "1"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: orders
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(255)
              - column:
                  name: total_amount
                  type: NUMERIC(38, 2)
              - column:
                  name: status
                  type: VARCHAR(255)
              - column:
                  name: deleted
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
  - changeSet:
      id: "2"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                indexName: idx_orders_user_id
                tableName: orders
      changes:
        - createIndex:
            indexName: idx_orders_user_id
            tableName: orders
            columns:
              - column:
                  name: user_id
  - changeSet:
      id: "3"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: order_items
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
              - column:
                  name: product_id
                  type: BIGINT
              - column:
                  name: price
                  type: NUMERIC(38, 2)
              - column:
                  name: quantity
                  type: INT
  - changeSet:
      id: "4"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - foreignKeyConstraintExists:
                foreignKeyName: fk_order_items_order
      changes:
        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: order_id
            constraintName: fk_order_items_order
            referencedTableName: orders
            referencedColumnNames: id
  - changeSet:
      id: "5"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                indexName: idx_order_items_product_id
                tableName: order_items
      changes:
        - createIndex:
            indexName: idx_order_items_product_id
            tableName: order_items
            columns:
              - column:
                  name: product_id
  - changeSet:
      id: "6"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: outbox_events
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_id
                  type: VARCHAR(255)
              - column:
                  name: event_type
                  type: VARCHAR(255)
              - column:
                  name: payload
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
  - changeSet:
      id: "7"
      author: "sony"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                indexName: idx_outbox_status
                tableName: outbox_events
      changes:
        - createIndex:
            indexName: idx_outbox_status
            tableName: outbox_events
            columns:
              - column:
                  name: status
