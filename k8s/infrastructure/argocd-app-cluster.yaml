apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shop-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sonyms/shop-microservices.git
    targetRevision: HEAD
    path: gitops/cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
