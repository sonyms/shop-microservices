server:
  port: 8086
  shutdown: graceful

spring:
  application:
    name: notification-service
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:19411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: "health,prometheus,info"
  tracing:
    enabled: true
    sampling:
      probability: 0.1

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [traceId=%X{traceId:-}, spanId=%X{spanId:-}] - %msg%n"

---
spring:
  config:
    activate:
      on-profile: k8s
eureka:
  client:
    enabled: false
